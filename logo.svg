<svg width="260" height="52" viewBox="0 0 260 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect width="52" height="52" rx="12" fill="url(#grad)"/>
  <!-- Chart accent line -->
  <polyline points="6,40 14,28 23,34 32,18 46,24"
    stroke="rgba(255,255,255,0.28)" stroke-width="2.2"
    fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- SB initials -->
  <text x="26" y="26"
    font-family="Inter,system-ui,Arial,sans-serif"
    font-size="18" font-weight="800"
    fill="white" text-anchor="middle" dominant-baseline="central">SB</text>

  <!-- Name -->
  <text x="68" y="22"
    font-family="Inter,system-ui,Arial,sans-serif"
    font-size="17" font-weight="800" fill="#ffffff">Saifeddine</text>

  <!-- Divider dot -->
  <circle cx="158" cy="19" r="2.5" fill="#6366f1"/>

  <!-- Tagline -->
  <text x="168" y="22"
    font-family="Inter,system-ui,Arial,sans-serif"
    font-size="13" font-weight="500" fill="#818cf8">Trading</text>

  <!-- Subtitle line -->
  <text x="68" y="40"
    font-family="Inter,system-ui,Arial,sans-serif"
    font-size="11" font-weight="500"
    fill="rgba(255,255,255,0.55)" letter-spacing="2">FOREX  &amp;  CRYPTO</text>
</svg>
